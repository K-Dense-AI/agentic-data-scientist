agents:
  agent.create_review_confirmation_agent:
    type: factory
    models: [REVIEW_MODEL]
    params:
      name: '{prompt_name}_agent'
      description: Determines whether to exit the review loop based on implementation status.
      instruction: instruction
      planner: BuiltInPlanner
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.0"
      output_schema: REVIEW_CONFIRMATION_OUTPUT_SCHEMA
      output_key: '{...}_decision'
      before_agent_callback: before_callback
      after_agent_callback: after_callback
      function: create_review_confirmation_agent
  claude_agent.0:
    type: instance
    models: [gemini-2.5-flash]
    params:
      working_dir: str(self.working_dir)
      function: _setup_agent
      instance: claude_agent
  claude_agent.1:
    type: instance
    models: [claude-sonnet-4-5-20250929]
    params:
      class: ClaudeCodeAgent
      base: Agent
      name: name
      description: ''
      after_agent_callback: after_agent_callback
      instance: claude_agent
  coding_agent:
    type: instance
    models: [gemini-2.5-flash]
    params:
      name: coding_agent
      description: A coding agent that uses Claude Code SDK to implement plans.
      working_dir: working_dir
      output_key: implementation_summary
      after_agent_callback: coding_compression_callback
      function: make_implementation_agents
  high_level_plan_parser:
    type: instance
    models: [gemini-2.5-pro]
    params:
      name: high_level_plan_parser
      description: Parses high-level plan into stages and success criteria.
      instruction: plan_parser_instructions
      output_schema: PLAN_PARSER_OUTPUT_SCHEMA
      output_key: parsed_plan_output
      after_agent_callback: plan_parser_callback
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.0"
      function: create_agent
  high_level_planning_loop:
    type: instance
    models: [gemini-2.5-flash]
    params:
      name: high_level_planning_loop
      description: Carries out high-level planning through multiple iterations.
      max_iterations: "10"
      function: create_agent
      sub_agents: [plan_maker_agent, plan_reviewer_agent, create_review_confirmation_agent]
  implementation_loop:
    type: instance
    models: [gemini-2.5-flash]
    params:
      name: implementation_loop
      description: Iterative implementation-review-confirmation loop for each stage.
      max_iterations: "5"
      function: create_agent
      sub_agents: [coding_agent, review_agent, review_confirmation]
  plan_maker_agent:
    type: instance
    models: [gemini-2.5-pro]
    tools: [read_file_bound, read_media_file_bound, list_directory_bound, directory_tree_bound, search_files_bound, get_file_info_bound]
    params:
      name: plan_maker_agent
      description: Plan maker agent - creates high-level plans for complex tasks.
      instruction: plan_maker_instructions
      output_key: high_level_plan
      planner: BuiltInPlanner
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.6"
      after_agent_callback: plan_maker_compression
      function: create_agent
  plan_reviewer_agent:
    type: instance
    models: [gemini-2.5-pro]
    tools: [read_file_bound, read_media_file_bound, list_directory_bound, directory_tree_bound, search_files_bound, get_file_info_bound]
    params:
      name: plan_reviewer_agent
      description: Plan reviewer agent - reviews high-level plans for completeness and correctness.
      instruction: plan_reviewer_instructions
      output_key: plan_review_feedback
      planner: BuiltInPlanner
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.3"
      after_agent_callback: plan_reviewer_compression
      function: create_agent
  review_agent:
    type: instance
    models: [REVIEW_MODEL]
    tools: [tools]
    params:
      name: review_agent
      description: Reviews implementation and provides feedback or approval.
      instruction: review_prompt
      planner: BuiltInPlanner
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.0"
      output_key: review_feedback
      include_contents: none
      after_agent_callback: review_compression_callback
      function: make_implementation_agents
  root_agent:
    type: instance
    params:
      name: agentic_data_scientist_workflow
      description: Complete Agentic Data Scientist workflow with adaptive stage-wise implementation.
      function: create_agent
      sub_agents: [high_level_planning_loop, high_level_plan_parser, stage_orchestrator, summary_agent]
  stage_orchestrator.0:
    type: instance
    models: [gemini-2.5-flash]
    params:
      implementation_loop: implementation_loop
      criteria_checker: success_criteria_checker
      stage_reflector: stage_reflector
      name: stage_orchestrator
      description: Orchestrates stage-by-stage implementation with adaptive planning.
      function: create_agent
      instance: stage_orchestrator
  stage_orchestrator.1:
    type: instance
    models: [gemini-2.5-flash]
    params:
      class: StageOrchestratorAgent
      base: BaseAgent
      name: name
      description: description
      instance: stage_orchestrator
  stage_reflector:
    type: instance
    models: [gemini-2.5-pro]
    tools: [read_file_bound, read_media_file_bound, list_directory_bound, directory_tree_bound, search_files_bound, get_file_info_bound]
    params:
      name: stage_reflector
      description: Reflects on and adapts remaining implementation stages.
      instruction: stage_reflector_instructions
      output_schema: STAGE_REFLECTOR_OUTPUT_SCHEMA
      output_key: stage_reflector_output
      after_agent_callback: combined_reflector_callback
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.4"
      function: create_agent
  success_criteria_checker:
    type: instance
    models: [gemini-2.5-pro]
    tools: [read_file_bound, read_media_file_bound, list_directory_bound, directory_tree_bound, search_files_bound, get_file_info_bound]
    params:
      name: success_criteria_checker
      description: Checks which high-level success criteria have been met.
      instruction: criteria_checker_instructions
      output_schema: CRITERIA_CHECKER_OUTPUT_SCHEMA
      output_key: criteria_checker_output
      after_agent_callback: combined_criteria_callback
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.0"
      function: create_agent
  summary_agent:
    type: instance
    models: [gemini-2.5-pro]
    tools: [read_file_bound, read_media_file_bound, list_directory_bound, directory_tree_bound, search_files_bound, get_file_info_bound]
    params:
      name: summary_agent
      description: Summarizes results into a comprehensive pure text report.
      instruction: summary_agent_instructions
      planner: BuiltInPlanner
      generate_content_config:
        class: get_generate_content_config
        temperature: "0.3"
      function: create_agent

models:
  claude-sonnet-4-5-20250929:
    type: literal
    agents: [claude_agent.1]
  gemini-2.5-flash:
    type: default
    agents: [claude_agent.0, coding_agent, implementation_loop, high_level_planning_loop, stage_orchestrator.0, stage_orchestrator.1]
  gemini-2.5-pro:
    type: literal
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, high_level_plan_parser, success_criteria_checker, stage_reflector]
    params:
      alias: [google/gemini-2.5-pro]
  REVIEW_MODEL:
    type: literal
    agents: [review_agent, agent.create_review_confirmation_agent]

tools:
  directory_tree_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: Generate a recursive directory tree view.
  get_file_info_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: Get detailed metadata about a file.
  list_directory_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: List directory contents with optional size display and sorting.
  read_file_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: Read file contents with optional head/tail line limits.
  read_media_file_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: Read binary/media files and return base64 encoded data.
  search_files_bound:
    type: function
    agents: [summary_agent, plan_maker_agent, plan_reviewer_agent, success_criteria_checker, stage_reflector]
    params:
      description: Search for files matching a pattern.
  tools:
    type: function
    agents: [review_agent]
    params:
      dynamic: "True"

teams:
  high_level_planning_loop:
    type: hierarchy
    agents: [high_level_planning_loop, plan_maker_agent, plan_reviewer_agent, create_review_confirmation_agent]
  implementation_loop:
    type: hierarchy
    agents: [implementation_loop, coding_agent, review_agent, review_confirmation]
  workflow:
    type: sequential
    agents: [workflow, high_level_planning_loop, high_level_plan_parser, stage_orchestrator, summary_agent]


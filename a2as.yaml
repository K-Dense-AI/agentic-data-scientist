variables:
  CODING_MODEL:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.claude_code.agent, src.agentic_data_scientist.agents.adk.utils]
  DEFAULT_MODEL:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]
  DISABLE_NETWORK_ACCESS:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]
  LITELLM_LOG:
    type: env
    params:
      caller: [os.environ]
  OPENROUTER_API_BASE:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]
  OPENROUTER_API_KEY:
    type: env
    params:
      caller: [os.getenv, os.environ]
      path: [src.agentic_data_scientist.agents.adk.utils]
  OR_APP_NAME:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]
  OR_SITE_URL:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]
  REVIEW_MODEL:
    type: env
    params:
      caller: [os.getenv]
      path: [src.agentic_data_scientist.agents.adk.utils]

files:
  ./:
    type: pattern
    actions: [read]
    params:
      patterns: ['*']
      caller: [_stream_responses, _collect_responses, main]
  .agentic_ds.log:
    type: literal
    actions: [read]
    params:
      caller: [main]
      path: [Path]
  .claude:
    type: literal
    actions: [read]
    params:
      caller: [setup_skills_directory]
      path: [working_path]
  .md:
    type: literal
    actions: [read]
    params:
      caller: [load_prompt]
      path: [prompts_dir]
  core.working_dir:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  current_path:
    type: variable
    actions: [read]
    params:
      caller: [current_path.iterdir]
  dest_path:
    type: variable
    actions: [delete]
    params:
      caller: [shutil.rmtree]
  dir_path:
    type: variable
    actions: [read]
    params:
      caller: [dir_path.iterdir]
  file_path:
    type: variable
    actions: [write, read]
    params:
      caller: [file_path.parent.mkdir, file_path.write_bytes, file_path.read_text]
  log_file:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  log_path:
    type: literal
    actions: [read, write]
    params:
      caller: [Path(log_file), log_path.parent.mkdir]
  path:
    type: variable
    actions: [read]
    params:
      caller: [Path, path.rglob]
  pattern/:
    type: variable
    actions: [read]
    params:
      links: [pattern]
      caller: [search_files]
  prompt_path:
    type: variable
    actions: [read]
    params:
      caller: [prompt_path.read_text]
  pyproject.toml:
    type: literal
    actions: [read]
    params:
      caller: [setup_working_directory]
      path: [working_path]
  pyproject_path:
    type: variable
    actions: [write]
    params:
      caller: [pyproject_path.write_text]
  README.md:
    type: literal
    actions: [read]
    params:
      caller: [setup_working_directory]
      path: [working_path]
  readme_path:
    type: variable
    actions: [write]
    params:
      caller: [readme_path.write_text]
  search_path:
    type: variable
    actions: [read]
    params:
      caller: [search_path.rglob]
  skill_dir:
    type: variable
    actions: [read]
    params:
      caller: [shutil.copytree]
  skills_dir:
    type: variable
    actions: [write]
    params:
      caller: [skills_dir.mkdir]
  source_path:
    type: variable
    actions: [read]
    params:
      caller: [source_path.iterdir, source_path.read_bytes]
  target_path:
    type: variable
    actions: [read]
    params:
      caller: [Path.resolve()]
  tmpdir:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  user_data_dir:
    type: variable
    actions: [write]
    params:
      caller: [user_data_dir.mkdir]
  working_dir:
    type: variable
    actions: [read, write]
    params:
      caller: [Path, working_dir.mkdir]
  working_path:
    type: literal
    actions: [read, write]
    params:
      caller: [Path(working_dir), working_path.mkdir]

processes:
  git:
    type: shell
    actions: [exec]
    args: [[clone, --depth, "1", 'https://github.com/K-Dense-AI/claude-scientific-skills.git', str(tmp_repo)]]
    params:
      caller: [subprocess.run]
      shell: ["False"]

networks:
  mcp.context7.com:
    type: api
    actions: [GET]
    urls: [/mcp]
    protocols: [https]
    ports: ["443"]
    params:
      caller: [_run_async_impl]
      links: [url]

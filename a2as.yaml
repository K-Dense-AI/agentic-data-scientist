      src/agentic_data_scientist/agents/adk/loop_detection.py, src/agentic_data_scientist/agents/adk/review_confirmation.py,
      src/agentic_data_scientist/agents/adk/stage_orchestrator.py, src/agentic_data_scientist/agents/adk/utils.py, src/agentic_data_scientist/agents/claude_code/agent.py,
